name: Build & Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: test-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-15
    timeout-minutes: 25
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.3.app/Contents/Developer
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: |
          echo "DEVELOPER_DIR=$DEVELOPER_DIR"
          xcodebuild -version
          xcrun swift --version

      - name: Build and test
        run: ./scripts/test.sh all

      - name: Upload test result bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TestResults
          path: build/test/TestResults.xcresult
