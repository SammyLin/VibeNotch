name: NotchAgent
options:
  bundleIdPrefix: com.openclaw
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  minimumXcodeGenVersion: "2.38.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  NotchAgent:
    type: application
    platform: macOS
    sources:
      - path: NotchAgent
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openclaw.notch-agent
        PRODUCT_NAME: NotchAgent
        INFOPLIST_FILE: ""
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright 2026 OpenClaw"
        SWIFT_EMIT_LOC_STRINGS: YES
        ENABLE_PREVIEWS: YES
